name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Buildozer o'zi litsenziyalarni va kerakli NDK'ni tortadi
          yes | buildozer -v android release
        env:
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: Izzatillo0201
          P4A_RELEASE_KEYALIAS: mykeyalias
          P4A_RELEASE_KEYALIAS_PASSWD: Izzatillo0201

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OlovliZarba-APK
          path: bin/*.apk
