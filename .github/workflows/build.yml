name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Eski build qoldiqlarini tozalab, keyin boshlaymiz
          buildozer android clean
          yes | buildozer -v android release
        env:
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: Izzatillo0201
          P4A_RELEASE_KEYALIAS: mykeyalias
          P4A_RELEASE_KEYALIAS_PASSWD: Izzatillo0201
