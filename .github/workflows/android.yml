name: Build Signed APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev libbz2-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # 1. Litsenziyalarni majburan qabul qilish
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
          
          # 2. Keystore faylini tiklash
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > mykey.keystore
          
          # 3. Buildozer Build (Toza build qilish uchun)
          # Agar avvalgi builddan qolgan xatolar bo'lsa, ularni tozalaydi
          buildozer android clean
          buildozer android debug
        env:
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYALIAS: ${{ secrets.ALIAS }}
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEY_STORE_PASSWORD }}
          P4A_RELEASE_KEY_PASSWD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Olovli-Zarba-APK
          path: bin/*.apk
