name: Build Signed APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # Bu yerda buildozer buyrug'i o'yinni yig'adi
          buildozer android debug
        env:
          # Secret-larni build jarayoniga ulash
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYALIAS: ${{ secrets.ALIAS }}
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEY_STORE_PASSWORD }}
          P4A_RELEASE_KEY_PASSWD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Olovli-Zarba-APK
          path: bin/*.apk
