name: Build Signed APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Accept Android SDK Licenses
        run: |
          # SDKmanager yo'lini aniqlash va litsenziyalarni qabul qilish
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/tools/bin
          
          # Litsenziyalarni qabul qilishning eng ishonchli yo'li
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
          sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;34.0.0" "platforms;android-34"
        shell: bash

      - name: Build with Buildozer
        run: |
          # Keystore faylini tiklash
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > mykey.keystore
          # APK yig'ish
          buildozer android debug
        env:
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYALIAS: ${{ secrets.ALIAS }}
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEY_STORE_PASSWORD }}
          P4A_RELEASE_KEY_PASSWD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Olovli-Zarba-APK
          path: bin/*.apk
