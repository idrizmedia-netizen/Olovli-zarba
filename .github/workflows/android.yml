name: Build Signed APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev libsqlite3-dev
          # MUHIM: Cython versiyasini aynan 0.29.33 qilamiz
          pip3 install --user --upgrade "Cython<3.0" buildozer
          pip3 install --user --upgrade requests chardet idna urllib3

      - name: Build with Buildozer
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > mykey.keystore
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Litsenziyalar (Siz aytgan avto-ha javobi)
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
          
          # Toza build uchun eski keshni o'chiramiz
          rm -rf .buildozer/
          
          # Buildni boshlash
          buildozer android debug
        env:
          P4A_RELEASE_KEYSTORE: mykey.keystore
          P4A_RELEASE_KEYALIAS: ${{ secrets.ALIAS }}
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEY_STORE_PASSWORD }}
          P4A_RELEASE_KEY_PASSWD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Olovli-Zarba-APK
          path: bin/*.apk
